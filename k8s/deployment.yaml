apiVersion: apps/v1
kind: Deployment

metadata:
  name: devops-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: devops-app

  template:

    metadata:
      labels:
        app: devops-app

    spec:

      containers:

      - name: devops-app

        image: rayudunarayana4-ship-it/devops-app:latest

        ports:

        - containerPort: 5000
